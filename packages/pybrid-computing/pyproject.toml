[project]
name = "pybrid-computing"
requires-python = ">=3.11,<4.0"
dynamic = ["version"]
description = "Library to interact with analog computers and analog-digital hybrid computers, in particular the LUCIDAC and REDAC computers made by anabrid"
authors = [
  {name = "Michael Steck", email = "pybrid-code@anabrid.com"}
]
readme = "README.md"
license = "MIT OR GPL-2.0-or-later"
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "Intended Audience :: End Users/Desktop",
  "Topic :: Communications",
  "Topic :: Scientific/Engineering :: Interface Engine/Protocol Translator",
  "Topic :: Software Development :: Embedded Systems",
  "Topic :: Terminals :: Serial",
  "Operating System :: POSIX"
]
dependencies = [
  "anyio>=4.11.0",
  "asyncclick>=8.2.2.2",
  "inflection>=0.5.1",
  "matplotlib>=3.10.6",
  "packaging>=25.0",
  "protobuf>=6.31.1",
  "pydantic>=2.11.9",
  "pyi>=0.1.0",
  "zeroconf>=0.147.2",
  "prompt-toolkit>=3.0.52",
  "pyserial-asyncio>=0.6",
  "pybrid-computing-native>=0.1.0,<1.0.0",
]

[project.urls]
Homepage = "https://anabrid.com/"
Documentation = "https://anabrid.dev/docs/pybrid/"

[project.scripts]
pybrid = 'pybrid.cli.base:entrypoint'

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pybrid"]

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
vcs = "git"
pattern = "^v(?P<base>\\d+\\.\\d+\\.\\d+)$"
commit-length = 7
format-jinja = "{% if distance == 0 %}{{ base }}{% else %}{{ serialize_pep440(bump_version(base), dev=distance, metadata=[commit]) }}{% endif %}"
fallback-version = "0.11.4"

[tool.uv.sources]
pybrid-computing-native = { workspace = true }
