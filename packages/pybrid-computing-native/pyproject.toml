[project]
name = "pybrid-computing-native"
version = "0.1.0"
requires-python = ">=3.11"
description = "Native C++ extensions for pybrid-computing"
authors = [
  {name = "anabrid", email = "pybrid-code@anabrid.com"}
]
license = "MIT OR GPL-2.0-or-later"
keywords = ["analog computing", "hybrid computing", "native", "pybind11"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: C++",
]

[project.urls]
Homepage = "https://anabrid.com/"
Repository = "https://github.com/anabrid/pybrid-computing"
Documentation = "https://anabrid.dev/docs/pybrid/"

[build-system]
requires = ["scikit-build-core>=0.10", "pybind11>=2.12"]
build-backend = "scikit_build_core.build"

[tool.scikit-build]
cmake.source-dir = "native"
cmake.build-type = "Release"
cmake.args = ["-DPYBRID_BUILD_PYTHON=ON"]
ninja.make-fallback = true
build-dir = "build/{wheel_tag}"
build.tool-args = ["-j8"]
wheel.packages = ["src/pybrid"]
