[project]
name = "pybrid-computing-native"
dynamic = ["version"]
requires-python = ">=3.11"
description = "Native C++ extensions for pybrid-computing"
authors = [
  {name = "anabrid", email = "pybrid-code@anabrid.com"}
]
readme = "README.md"
license = "MIT OR GPL-2.0-or-later"
keywords = ["analog computing", "hybrid computing", "native", "pybind11"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: C++",
]

[project.urls]
Homepage = "https://anabrid.com/"
Repository = "https://github.com/anabrid/pybrid-computing"
Documentation = "https://anabrid.dev/docs/pybrid/"

[build-system]
requires = ["hatchling", "uv-dynamic-versioning", "scikit-build-core>=0.10", "pybind11>=2.12", "ninja"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pybrid"]

[tool.hatch.build.targets.wheel.hooks.scikit-build]
experimental = true

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
vcs = "git"
pattern = "^v(?P<base>\\d+\\.\\d+\\.\\d+)$"
commit-length = 7
format-jinja = "{% if distance == 0 %}{{ base }}{% else %}{{ serialize_pep440(bump_version(base), dev=distance, metadata=[commit]) }}{% endif %}"
fallback-version = "0.11.4"

[tool.scikit-build]
cmake.source-dir = "native"
cmake.build-type = "Release"
cmake.args = ["-DPYBRID_BUILD_PYTHON=ON"]
ninja.make-fallback = true
build-dir = "build/{wheel_tag}"


[tool.cibuildwheel]
build = "cp311-* cp312-* cp313-* cp314-*"
skip = ["pp*", "*-musllinux*"]
build-frontend = "build[uv]"
test-command = "python -c \"from importlib.util import find_spec; s = find_spec('pybrid.native._impl'); assert s is not None, '_impl not found'; print('native extension found at', s.origin)\""
build-verbosity = 1

[tool.cibuildwheel.linux]
archs = ["x86_64"]
manylinux-x86_64-image = "manylinux_2_28"
before-all = "yum install -y cmake3 ninja-build || apk add cmake ninja"
before-build = "rm -rf {package}/build"

[tool.cibuildwheel.macos]
archs = ["x86_64", "arm64"]
before-all = "bash {package}/build-scripts/macos-prebuild-deps.sh"
before-build = "rm -rf {package}/build"
environment = { SDKROOT = "$(xcrun --show-sdk-path)", CMAKE_BUILD_PARALLEL_LEVEL = "1", PYBRID_DEPS_PREFIX = "/tmp/pybrid_deps" }

[tool.cibuildwheel.windows]
archs = ["AMD64"]
# Pre-build abseil + protobuf once (cached across CI runs if versions match).
before-all = "powershell -ExecutionPolicy Bypass -File {package}\\build-scripts\\windows-prebuild-deps.ps1"
# Short absolute build dir to avoid MSBuild FileTracker exceeding MAX_PATH
# (the CI runner's working directory is already ~134 chars deep).
before-build = "if exist C:\\skb rmdir /s /q C:\\skb"
environment = { SKBUILD_BUILD_DIR = "C:/skb/{wheel_tag}", CMAKE_BUILD_PARALLEL_LEVEL = "4", PYBRID_DEPS_PREFIX = "C:/pybrid_deps" }
