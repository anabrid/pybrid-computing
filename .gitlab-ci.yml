stages:
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

.anabrid-uv-job:
  image:
    name: astral/uv:python3.13-bookworm-slim

.anabrid-if-release-job:
  rules:
    - if: $CI_COMMIT_TAG

test:
  extends: .anabrid-uv-job
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y -qq build-essential cmake git > /dev/null
  script:
    - apt-get update -qq && apt-get install -y -qq build-essential cmake > /dev/null
    - uv sync --python 3.13 --group dev
    - PYBRID_TEST_PORT=16732 uv run pytest --ignore=tests/device --ignore=tests/e2e
  artifacts:
    expire_in: 3 days
    reports:
      junit: report.xml

build:
  extends: [.anabrid-uv-job, .anabrid-if-release-job]
  stage: build
  before_script:
    - apt-get update -qq && apt-get install -y -qq build-essential cmake git > /dev/null
  script:
    - uv build --package pybrid-computing-native
    - uv build --package pybrid-computing
  artifacts:
    paths:
      - dist/
    expire_in: 3 days
