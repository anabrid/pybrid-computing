workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

stages:
  - test
  - build
  - docs
  - publish

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DELETE_OLD_PACKAGES: "true"
  GIT_DEPTH: 0

cache:
  paths:
    - .cache/pip

.anabrid-uv-job:
  image:
    name: astral/uv:python3.13-bookworm-slim

.anabrid-if-release-job:
  rules:
    - if: $CI_COMMIT_TAG
    - when: manual
      allow_failure: true

.build-native-base:
  extends: .anabrid-if-release-job
  stage: build
  artifacts:
    paths:
      - dist/
    expire_in: 3 hours

###
# Runs Python-based tests, only applicable to Linux. Should not be run within
# docker as it requires binding host ports.
###

test:
  extends: .anabrid-uv-job
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y -qq build-essential cmake git > /dev/null
  script:
    - uv sync --python 3.13 --group dev --no-editable
    - PYBRID_TEST_PORT=16732 uv run pytest --ignore=tests/device --ignore=tests/e2e
  artifacts:
    expire_in: 3 hours
    reports:
      junit: report.xml

###
# Runs the C++/GoogleTest suite for pybrid-computing-native. Guards against
# regressions in ProxyServer, DataChannel, and transport code that the
# pure-Python suite cannot reach.
###

test:native:
  extends: .anabrid-uv-job
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y -qq build-essential cmake git > /dev/null
  script:
    - cmake -S packages/pybrid-computing-native/native -B build-tests -DPYBRID_BUILD_TESTS=ON
    - cmake --build build-tests -j$(nproc)
    - ctest --test-dir build-tests --output-on-failure --output-junit report-native.xml
  artifacts:
    expire_in: 3 hours
    when: always
    reports:
      junit: build-tests/report-native.xml

###
# BUILD: Native/C++ code, mainly for networking and the proxy. This should best
# be in docker containers (`docker` tag) as it uses
# native functions and involves installing packages
#
# Uses cibuildwheel (https://cibuildwheel.pypa.io/en/stable/) to build
# binary Python weel packages across operating systems.
###

build:native:linux:
  extends: .build-native-base
  tags: [linux, shell]
  script:
    - uv venv --python 3.13
    - uv pip install cibuildwheel
    - uv run --no-project cibuildwheel --platform linux --output-dir dist packages/pybrid-computing-native

build:native:macos:
  extends: .build-native-base
  tags: [macos, shell]
  script:
    - uv venv --python 3.13
    - uv pip install cibuildwheel
    - uv run --no-project cibuildwheel --platform macos --output-dir dist packages/pybrid-computing-native

# Runner prerequisites (one-time setup):
#   1. Enable long paths (MSBuild's deeply nested .tlog files exceed MAX_PATH):
#      reg add HKLM\SYSTEM\CurrentControlSet\Control\FileSystem /v LongPathsEnabled /t REG_DWORD /d 1 /f
#   2. Enable long paths in git:
#      git config --system core.longpaths true
#   3. Reboot the runner.
build:native:windows:
  extends: .build-native-base
  tags: [windows, shell]
  script:
    - $env:Path = "C:\Users\anabrid\.local\bin;$env:Path"
    # uvx instead of uv run: a uv venv leaks its stdlib into cibuildwheel's
    # per-version build venvs, causing Python version mismatches on Windows.
    - uvx cibuildwheel --platform windows --output-dir dist packages/pybrid-computing-native

###
# DOCS: generate docuemntation
###

docs:
  extends: .anabrid-uv-job
  stage: docs
  script:
    - uv sync --group docs --no-install-package pybrid-computing-native
    # suppresses warning by mkdocs-material about incompatibility with mkDocs v2.0
    - NO_MKDOCS_2_WARNING=1 uv run --no-sync mkdocs build --strict --site-dir public
  artifacts:
    paths:
      - public


###
# BUILD: Pure Python (pybrid) package as source.
###

build:python:
  extends: [.anabrid-uv-job, .anabrid-if-release-job]
  stage: build
  before_script:
    - apt-get update -qq && apt-get install -y -qq git > /dev/null
  script:
    - uv build --package pybrid-computing
  artifacts:
    paths:
      - dist/
    expire_in: 3 hours

###
# PUBLISH: Both packages, pybrid-computing and pybrid-computing-native,
# are pushed to Gitlab's package registry
###

publish:gitlab:
  extends: [.anabrid-uv-job, .anabrid-if-release-job]
  stage: publish
  needs:
    - build:native:linux
    - build:native:macos
    - build:native:windows
    - build:python
  script:
    - uv publish
        --publish-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi
        --username gitlab-ci-token
        --password ${CI_JOB_TOKEN}
        dist/*

publish:github-pages:
  image:
    name: alpine:latest
  stage: publish
  needs:
    - docs
  before_script:
    - apk add --no-cache git
  script:
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab"
    - cd public
    - git init --initial-branch gh-pages
    - git add .
    - git commit -m "Deploy docs from ${CI_COMMIT_SHORT_SHA}"
    - git remote add github https://${GITHUB_TOKEN}@github.com/${GITHUB_PAGES_REPO}.git
    - git push --force github gh-pages
  rules:
    - if: $CI_COMMIT_TAG
    - when: manual
      allow_failure: true

# for externals, push all the packages to a Github repo as well
publish:pypi:
  extends: [.anabrid-uv-job, .anabrid-if-release-job]
  stage: publish
  needs:
    - build:native:linux
    - build:native:macos
    - build:native:windows
    - build:python
  script:
    - pip install twine
    - twine upload
        --username ${TWINE_USERNAME}
        --password ${TWINE_PASSWORD}
        dist/*
