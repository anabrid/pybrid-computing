[tool.poetry]
# from cookiecutter
name = "pybrid-computing-base"
packages = [
  { include = "pybrid" }
]
version = "0.10.1"
description = "pybrid-computing base analog and hybrid abstractions"
authors = ["Michael Steck <steck@anabrid.com>"]
# from project

[tool.poetry.dependencies]
# from cookiecutter
python = "^3.9"
# from project
anyio = "^3.6.1"
asyncclick = "^8.1.3.2"
packaging = "^22.0"
prompt-toolkit = "^3.0.39"
pyserial-asyncio = "^0.6"

[tool.poetry.group.dev.dependencies]
# from cookiecutter
pytest = "^7"
# from project
pytest-asyncio = "^0.18.3"

[tool.poetry.scripts]
pybrid = 'pybrid.cli.base:entrypoint'

[[tool.poetry.source]]
name = "anabrid"
url = "https://pypi.tinybridge.anabrid.dev/"
priority = "supplemental"

[build-system]
# from cookiecutter
requires = ["poetry_core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
# from project

[tool.black]
# from cookiecutter
line-length = 88
# from project

[tool.isort]
# from cookiecutter
profile = "black"
# from project
