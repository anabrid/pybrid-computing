[tool.poetry]
# from cookiecutter
name = "pyanabrid-hybrid-controller"
packages = [
  { include = "pyanabrid" }
]
version = "0.1.2"
description = "anabrid hybrid controller abstraction"
authors = ["Michael Steck <steck@anabrid.com>"]
# from project

[tool.poetry.dependencies]
# from cookiecutter
python = "^3.9"
# from project
pyanabrid-analog-base = "^0.1.0"
pyanabrid-analog-modelone = "^0.1.0"
pyanabrid-tools = "^0.1.0"
pyanabrid-hybrid-protocol = "^0.1.1"
pyanabrid-hybrid-transport = "^0.1.0"

[tool.poetry.dev-dependencies]
# from cookiecutter
pytest = "^7"
# from project
pytest-asyncio = "^0.18.3"

[build-system]
# from cookiecutter
requires = ["poetry_core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
# from project

[tool.black]
# from cookiecutter
line-length = 88
# from project

[tool.isort]
# from cookiecutter
profile = "black"
# from project
