[tool.poetry]
# from cookiecutter
name = "pyanabrid-redac"
packages = [
  { include = "pyanabrid" }
]
version = "0.8.2"
description = "pyanabrid REDAC analog computer abstraction"
authors = ["Michael Steck <steck@anabrid.com>"]
# from project

[tool.poetry.dependencies]
# from cookiecutter
python = "^3.10"
# from project
asyncclick = "^8.1.3.4"
inflection = "^0.5.1"
matplotlib = { version = "^3.5.3", extras = ["examples"] }
pyqt5 = { version = "^5.15.2", extras = ["examples"] }
pyanabrid-base-analog = "^0, >=0.3.2"
pyanabrid-base-cli = "^0, >=0.5.0"
pyanabrid-base-hybrid = "^0, >=0.7.0"
pyanabrid-base-utils = "^0, >=0.4.0"
pydantic = "^1.10.5"

[tool.poetry.group.dev.dependencies]
# from cookiecutter
pytest = "^7"
# from project
sphinx = "^5.1.1"
sphinx-autobuild = "^2021.3.14"
sphinx-click = "^5.1.0"
sphinx-rtd-theme = "^1.0.0"
sphinxcontrib-plantuml = "^0.24"

[[tool.poetry.source]]
name = "anabrid"
url = "https://pypi.tinybridge.anabrid.dev/"
priority = "supplemental"

[build-system]
# from cookiecutter
requires = ["poetry_core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
# from project

[tool.black]
# from cookiecutter
line-length = 88
# from project

[tool.isort]
# from cookiecutter
profile = "black"
# from project
