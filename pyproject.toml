[tool.poetry]
# from cookiecutter
name = "pyanabrid-base-hybrid"
packages = [
  { include = "pyanabrid" }
]
version = "0.7.1"
description = "anabrid base hybrid controller abstraction"
authors = ["Michael Steck <steck@anabrid.com>"]
# from project

[tool.poetry.dependencies]
# from cookiecutter
python = "^3.9"
# from project
packaging = "^22.0"
pyanabrid-base-analog = "^0, >=0.3.0"
pyanabrid-base-transport = "^0, >=0.2.0"

[tool.poetry.dev-dependencies]
# from cookiecutter
pytest = "^7"
# from project
pytest-asyncio = "^0.18.3"

[[tool.poetry.source]]
name = "anabrid"
url = "https://pypi.tinybridge.anabrid.dev/"
default = false
secondary = false

[build-system]
# from cookiecutter
requires = ["poetry_core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
# from project

[tool.black]
# from cookiecutter
line-length = 88
# from project

[tool.isort]
# from cookiecutter
profile = "black"
# from project
