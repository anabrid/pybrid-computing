[tool.poetry]
# from cookiecutter
name = "pyanabrid-redac"
packages = [
  { include = "pyanabrid" }
]
version = "0.7.1"
description = "pyanabrid REDAC analog computer abstraction"
authors = ["Michael Steck <steck@anabrid.com>"]
# from project

[tool.poetry.dependencies]
# from cookiecutter
python = "^3.9"
# from project
asyncclick = "^8.1.3.4"
pyanabrid-base-hybrid = "^0.6.0"
pydantic = "^1.10.5"
pyanabrid-base-cli = "^0.4.0"
inflection = "^0.5.1"

[tool.poetry.dev-dependencies]
# from cookiecutter
pytest = "^7"
# from project

[[tool.poetry.source]]
name = "anabrid"
url = "https://pypi.tinybridge.anabrid.dev/"
default = false
secondary = false

[build-system]
# from cookiecutter
requires = ["poetry_core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
# from project

[tool.black]
# from cookiecutter
line-length = 88
# from project

[tool.isort]
# from cookiecutter
profile = "black"
# from project
